<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  .sar-root { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; color: var(--color-text-primary); }
  .sar-mono { font-family: 'IBM Plex Mono', monospace; }
  .sar-header { border-bottom: 1px solid var(--color-border-secondary); padding-bottom: 12px; margin-bottom: 16px; }
  .sar-title { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-secondary); margin: 0 0 2px; }
  .sar-subtitle { font-size: 18px; font-weight: 500; margin: 0; font-family: 'IBM Plex Mono', monospace; }
  .sar-grid { display: grid; grid-template-columns: 240px 1fr; gap: 16px; }
  .sar-panel { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; }
  .sar-panel-title { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; color: var(--color-text-tertiary); margin: 0 0 10px; font-family: 'IBM Plex Mono', monospace; }
  .alert-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .alert-card:hover { border-color: var(--color-border-secondary); }
  .alert-card.selected { border-color: #E24B4A; border-width: 1px; }
  .alert-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; margin: 0 0 4px; }
  .alert-type { font-size: 11px; color: var(--color-text-secondary); margin: 0 0 6px; }
  .tag { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 3px; margin-right: 4px; margin-top: 2px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
  .tag-high { background: #FCEBEB; color: #A32D2D; }
  .tag-mixer { background: #FAEEDA; color: #854F0B; }
  .tag-media { background: #FAEEDA; color: #854F0B; }
  .tag-clear { background: #EAF3DE; color: #3B6D11; }
  .field-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 8px; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; padding-top: 1px; }
  .field-value { font-size: 11px; font-family: 'IBM Plex Mono', monospace; text-align: right; word-break: break-all; }
  .btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 9px 18px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: 0.03em; width: 100%; margin-top: 10px; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-export { background: #E24B4A; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 9px 18px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: 0.03em; width: 100%; transition: opacity 0.15s; }
  .btn-export:hover { opacity: 0.85; }
  .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }
  .narrative-box { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 14px 16px; min-height: 220px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.7; color: var(--color-text-primary); width: 100%; box-sizing: border-box; resize: vertical; }
  .narrative-box:focus { outline: none; border-color: var(--color-border-primary); }
  .check-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .check-row:last-child { border-bottom: none; }
  .check-row input[type=checkbox] { width: 14px; height: 14px; accent-color: #E24B4A; cursor: pointer; }
  .check-label { font-size: 11px; font-weight: 500; cursor: pointer; }
  .check-desc { font-size: 10px; color: var(--color-text-tertiary); margin-left: auto; font-family: 'IBM Plex Mono', monospace; }
  .phase-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; font-family: 'IBM Plex Mono', monospace; padding: 3px 8px; border-radius: 3px; background: var(--color-background-info); color: var(--color-text-info); margin-bottom: 10px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--color-border-tertiary); border-top-color: var(--color-text-primary); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--color-text-secondary); padding: 6px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: 10px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: #E24B4A; }
  .dot-amber { background: #EF9F27; }
  .dot-green { background: #639922; }
  .sar-export { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.8; }
  .sar-export h3 { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--color-text-tertiary); margin: 14px 0 6px; font-weight: 600; }
  .sar-export h3:first-child { margin-top: 0; }
  .sar-export-divider { border: none; border-top: 0.5px solid var(--color-border-secondary); margin: 10px 0; }
  .success-banner { background: #EAF3DE; color: #27500A; border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 11px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .error-banner { background: #FCEBEB; color: #791F1F; border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 11px; font-weight: 500; margin-bottom: 10px; }
  .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 10px; }
  .metric-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-tertiary); font-family: 'IBM Plex Mono', monospace; }
  .metric-val { font-size: 15px; font-weight: 500; margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
  .streaming-cursor { display: inline-block; width: 7px; height: 12px; background: var(--color-text-primary); margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
</style>

<div class="sar-root" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useRef, useCallback } = React;

const ALERTS = [
  {
    Customer_ID: 'CUST-NORDIC-772',
    Transaction_Type: 'Cross-Border Wallet Transfer',
    Risk_Level: 'High',
    Adverse_Media: 'YES',
    PEP_Status: 'Non-PEP',
    SoW_Verified: 'NO',
    Mixer_Flag: 'YES',
    OSINT: 'Negative news in Swedish media; linked to sanctioned entities.',
    OFAC: 'Clear',
    Complexity: 'High-Risk Mixer Exposure'
  },
  {
    Customer_ID: 'BP-9921-LT',
    Transaction_Type: 'Cross-Border Crypto-to-Fiat',
    Risk_Level: 'High',
    Adverse_Media: 'YES',
    PEP_Status: 'Non-PEP',
    SoW_Verified: 'NO',
    Mixer_Flag: 'YES',
    OSINT: 'Negative news in Nordic media regarding shell company links.',
    OFAC: 'Clear',
    Complexity: 'High-Complexity / Corporate'
  }
];

function App() {
  const [selected, setSelected] = useState(0);
  const [phase, setPhase] = useState('triage');
  const [narrative, setNarrative] = useState('');
  const [streaming, setStreaming] = useState(false);
  const [streamText, setStreamText] = useState('');
  const [checks, setChecks] = useState({ pof: false, kyc: false, mica: false, ofac: false });
  const [exportDone, setExportDone] = useState(false);
  const [error, setError] = useState('');
  const alert = ALERTS[selected];

  const allChecked = checks.pof && checks.kyc && checks.mica && checks.ofac;

  const generateNarrative = useCallback(async () => {
    setStreaming(true);
    setStreamText('');
    setError('');
    setPhase('investigating');
    const prompt = `You are a Senior AML Compliance Officer at a Nordic FinTech institution, operating in the Second Line of Defence (2LoD). Generate a formal Statement of Facts (SOF) for an official SAR/STR filing based on the following alert data.

Alert Data:
- Customer ID: ${alert.Customer_ID}
- Transaction Type: ${alert.Transaction_Type}
- Risk Level: ${alert.Risk_Level}
- Adverse Media Flag: ${alert.Adverse_Media}
- PEP Status: ${alert.PEP_Status}
- Source of Wealth Verified: ${alert.SoW_Verified}
- Crypto Mixer Flag: ${alert.Mixer_Flag}
- OSINT Summary: ${alert.OSINT}
- OFAC Screening Result: ${alert.OFAC}
- Business Model Complexity: ${alert.Complexity}

Chain-of-thought analysis required:
1. SUBJECT INFORMATION — Summarise key customer identifiers and risk profile in 2-3 sentences.
2. STATEMENT OF FACTS — Describe the suspicious activity chronologically. Reference the Crypto Mixer Flag and explain why it indicates potential fund obfuscation.
3. INVESTIGATIVE FINDINGS — Cross-reference the OSINT Summary with Nordic regulatory context (AMLD6, MiCA). Analyse the absence of Source of Wealth verification against the business model complexity.
4. COMPLIANCE OFFICER DECISION — State clearly whether a SAR filing is recommended. Justify with reference to OFAC status, PEP status, and applicable regulations.

Format as a professional compliance document. Use clear section headings. Use this as the base for document:
1. Case & Filing Details: [Case Reference Number], [Report Prepared Date], [Filing Institution], [Department], [Contact].
2. Subject Information: [Subject Full Name], [Date Of Birth], [Living Address], [Contact], [ID Number], [Account Number].
3. Summary of Suspicious Activity: [Date] the transaction monitoring system generated multiple alerts for account [Subject Information: [Account Number], [Subject Information: [Subject Full Name]].
(Paragraph one:) The alerts arose from [Subject's Transaction Information and reasoning why the alerts were generated by the transaction monitoring system. Chain-of-thought analysis: STATEMENT OF FACTS]. 
(Paragraph two:) [Chain-of-thought analysis: [INVESTIGATIVE FINDINGS]].
(Paragraph three:) Requested supporting documentation [Name Of The Provided Documents If Any] lacks verifiable detail [Decribe The Reason Of Filling SAR Report]. 
[Add The Description Of The Proof, The Pattern, What the [STATEMENT OF FACTS] Actually Mean In This Context].
4. Detailed Transaction Information: [Transactions Table With All The Suspicious And Related Transactions, Including: Column For Date Of The Transaction, Amount Of The Transaction, Sender/Receiver, Payment Method, Details]
5. Nature of Suspicion — Red Flags: [List Of All The Suspicion And Unexplained Behavior That Points To Fraud].
6. Nature of Suspicion — Typologies: [The Meaning Of Each Subject's Behavior On The List Explained In Typologies].
7. Additional Information: [Supporting Evidence: List Of The Evidence In This SAR Report], [Related Accounts], [Connected Parties], [Public Records: Adverse Media, Counterparty Corporate Records].
8. Escalation Status: [Action Taken Because Of Suspicion].
9. Recommendation: [Chain-of-thought analysis: COMPLIANCE OFFICER DECISION].
10. Signatures: Prepared by: [Officer's Who Filled The SAR Full Name], [Officer's Signature], Reviewed by: [Employee That Reviewed The Filled SAR Report], [Reviewer's Signature].
11. Footer: Confidential — For internal use / law enforcement referral only. 

Usage of the Base: Fill the parts that are inside the square brackets "[]".

Be concise and precise.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        throw new Error(`API error ${res.status}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                full += parsed.delta.text;
                setStreamText(full);
              }
            } catch {}
          }
        }
      }
      setNarrative(full);
      setPhase('review');
    } catch (e) {
      setError('Investigation failed: ' + e.message);
      setPhase('triage');
    } finally {
      setStreaming(false);
    }
  }, [alert]);

  const handleExport = () => {
    if (!allChecked) return;
    setExportDone(true);
    setPhase('exported');
  };

  return React.createElement('div', { className: 'sar-root' },
    React.createElement('div', { className: 'sar-header' },
      React.createElement('p', { className: 'sar-title' }, 'Anti-Money Laundering · Second Line of Defence'),
      React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' } },
        React.createElement('h1', { className: 'sar-subtitle' }, 'Agentic SAR Generator'),
        React.createElement('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
          React.createElement('span', { className: 'tag tag-high' }, 'L1 → L2 QC'),
          React.createElement('span', { className: 'tag tag-clear' }, 'MiCA / AMLD6')
        )
      )
    ),

    React.createElement('div', { className: 'sar-grid' },
      React.createElement('div', null,
        React.createElement('div', { className: 'sar-panel', style: { marginBottom: 12 } },
          React.createElement('p', { className: 'sar-panel-title' }, 'EDD Alert Triage'),
          React.createElement('div', { className: 'metric-row' },
            React.createElement('div', { className: 'metric' },
              React.createElement('div', { className: 'metric-label' }, 'Alerts'),
              React.createElement('div', { className: 'metric-val' }, '2')
            ),
            React.createElement('div', { className: 'metric' },
              React.createElement('div', { className: 'metric-label' }, 'Risk'),
              React.createElement('div', { className: 'metric-val', style: { color: '#E24B4A' } }, 'HIGH')
            )
          ),
          ALERTS.map((a, i) =>
            React.createElement('div', {
              key: i,
              className: 'alert-card' + (selected === i ? ' selected' : ''),
              onClick: () => { setSelected(i); setPhase('triage'); setNarrative(''); setStreamText(''); setChecks({ pof: false, kyc: false, mica: false, ofac: false }); setExportDone(false); setError(''); }
            },
              React.createElement('p', { className: 'alert-id' }, a.Customer_ID),
              React.createElement('p', { className: 'alert-type' }, a.Transaction_Type),
              React.createElement('div', null,
                React.createElement('span', { className: 'tag tag-high' }, 'High Risk'),
                a.Mixer_Flag === 'YES' && React.createElement('span', { className: 'tag tag-mixer' }, 'Mixer'),
                a.Adverse_Media === 'YES' && React.createElement('span', { className: 'tag tag-media' }, 'Adverse Media')
              )
            )
          )
        ),

        React.createElement('div', { className: 'sar-panel' },
          React.createElement('p', { className: 'sar-panel-title' }, 'Alert Detail'),
          [
            ['CUST ID', alert.Customer_ID],
            ['TX TYPE', alert.Transaction_Type],
            ['PEP STATUS', alert.PEP_Status],
            ['SoW VERIFIED', alert.SoW_Verified],
            ['MIXER FLAG', alert.Mixer_Flag],
            ['OFAC', alert.OFAC],
            ['COMPLEXITY', alert.Complexity]
          ].map(([k, v]) =>
            React.createElement('div', { key: k, className: 'field-row' },
              React.createElement('span', { className: 'field-label' }, k),
              React.createElement('span', { className: 'field-value', style: { color: (v === 'YES' || v === 'High') ? '#E24B4A' : v === 'NO' ? '#BA7517' : v === 'Clear' ? '#639922' : 'inherit' } }, v)
            )
          )
        )
      ),

      React.createElement('div', null,
        phase === 'triage' && React.createElement('div', null,
          React.createElement('div', { className: 'status-bar' },
            React.createElement('span', { className: 'dot dot-amber' }),
            'Awaiting agentic investigation — select alert and initiate'
          ),
          React.createElement('div', { className: 'sar-panel' },
            React.createElement('p', { className: 'sar-panel-title' }, 'OSINT Summary'),
            React.createElement('p', { style: { margin: 0, fontFamily: 'IBM Plex Mono, monospace', fontSize: 11, lineHeight: 1.7, color: 'var(--color-text-secondary)' } }, alert.OSINT),
          ),
          error && React.createElement('div', { className: 'error-banner' }, error),
          React.createElement('button', {
            className: 'btn-primary',
            onClick: generateNarrative,
            disabled: streaming
          }, 'Initiate Agentic Investigation →')
        ),

        (phase === 'investigating') && React.createElement('div', null,
          React.createElement('div', { className: 'status-bar' },
            React.createElement('span', { className: 'spinner' }),
            'Claude is analysing blockchain patterns and OSINT data...'
          ),
          React.createElement('div', { className: 'sar-panel' },
            React.createElement('p', { className: 'sar-panel-title' }, 'Statement of Facts — Generating'),
            React.createElement('div', { className: 'narrative-box', style: { minHeight: 280, display: 'block', whiteSpace: 'pre-wrap' } },
              streamText,
              React.createElement('span', { className: 'streaming-cursor' })
            )
          )
        ),

        phase === 'review' && React.createElement('div', null,
          React.createElement('div', { className: 'status-bar' },
            React.createElement('span', { className: 'dot dot-amber' }),
            'L2 Quality Check — Human-in-the-Loop review required'
          ),
          React.createElement('div', { className: 'sar-panel', style: { marginBottom: 12 } },
            React.createElement('p', { className: 'sar-panel-title' }, 'Statement of Facts — Edit & Validate'),
            React.createElement('textarea', {
              className: 'narrative-box',
              value: narrative,
              onChange: e => setNarrative(e.target.value),
              style: { minHeight: 240, display: 'block' }
            })
          ),
          React.createElement('div', { className: 'sar-panel', style: { marginBottom: 10 } },
            React.createElement('p', { className: 'sar-panel-title' }, 'Bitpanda AFC · 2LoD Validation Checklist'),
            [
              ['pof', 'Proof of Funds / Wealth (PoF/W) Verified', 'AML Art. 8(3)'],
              ['kyc', 'KYC Validation Confirmed (Identity & Residency)', 'AMLD6 §13'],
              ['mica', 'MiCA Crypto Exposure & Nordic Media Review', 'MiCA Reg. 2023/1114'],
              ['ofac', 'OFAC / Sanctions Screening Re-confirmed', 'OFAC 31 CFR']
            ].map(([key, label, ref]) =>
              React.createElement('div', { key, className: 'check-row' },
                React.createElement('input', {
                  type: 'checkbox',
                  id: 'chk-' + key,
                  checked: checks[key],
                  onChange: e => setChecks(c => ({ ...c, [key]: e.target.checked }))
                }),
                React.createElement('label', { htmlFor: 'chk-' + key, className: 'check-label' }, label),
                React.createElement('span', { className: 'check-desc' }, ref)
              )
            )
          ),
          !allChecked && React.createElement('div', { className: 'error-banner' }, 'Submission blocked — all 2LoD validation checks must be confirmed before export.'),
          React.createElement('button', {
            className: 'btn-export',
            onClick: handleExport,
            disabled: !allChecked
          }, allChecked ? 'Export Official SAR / STR Report →' : 'Complete checklist to unlock export')
        ),

        phase === 'exported' && React.createElement('div', null,
          React.createElement('div', { className: 'success-banner' },
            '✓ SAR_Report_' + alert.Customer_ID + '.pdf — certified and exported'
          ),
          React.createElement('div', { className: 'sar-export' },
            React.createElement('h3', null, '◆ Official Suspicious Activity Report'),
            React.createElement('div', { style: { fontSize: 11, color: 'var(--color-text-secondary)', marginBottom: 6, fontFamily: 'IBM Plex Mono, monospace' } },
              'Reference: SAR/' + alert.Customer_ID + '/2026 · Filed: ' + new Date().toISOString().split('T')[0]
            ),
            React.createElement('hr', { className: 'sar-export-divider' }),
            React.createElement('h3', null, 'Section I — Subject Information'),
            [
              ['Customer ID', alert.Customer_ID],
              ['Transaction Type', alert.Transaction_Type],
              ['Risk Classification', alert.Risk_Level],
              ['Adverse Media', alert.Adverse_Media],
              ['PEP Status', alert.PEP_Status],
              ['Source of Wealth', alert.SoW_Verified === 'YES' ? 'Verified' : 'Not Verified'],
              ['Crypto Mixer Exposure', alert.Mixer_Flag === 'YES' ? 'Detected' : 'None'],
              ['OFAC / Sanctions', alert.OFAC],
              ['Business Complexity', alert.Complexity]
            ].map(([k, v]) =>
              React.createElement('div', { key: k, style: { display: 'flex', justifyContent: 'space-between', padding: '3px 0', borderBottom: '0.5px solid var(--color-border-tertiary)', fontSize: 10 } },
                React.createElement('span', { style: { color: 'var(--color-text-tertiary)' } }, k),
                React.createElement('span', { style: { fontWeight: 500, color: (v === 'Detected' || v === 'Not Verified' || v === 'High') ? '#E24B4A' : v === 'Clear' ? '#639922' : 'inherit' } }, v)
              )
            ),
            React.createElement('hr', { className: 'sar-export-divider' }),
            React.createElement('h3', null, 'Section II — Statement of Facts & Findings'),
            React.createElement('div', { style: { whiteSpace: 'pre-wrap', fontSize: 10, lineHeight: 1.75, color: 'var(--color-text-secondary)' } }, narrative),
            React.createElement('hr', { className: 'sar-export-divider' }),
            React.createElement('h3', null, 'Section III — Compliance Officer Decision'),
            React.createElement('div', { style: { fontSize: 10, lineHeight: 1.75 } },
              'Decision: ', React.createElement('strong', null, 'RECOMMEND SAR FILING'),
              React.createElement('br', null),
              'L2 Quality Check Status: ', React.createElement('span', { style: { color: '#639922', fontWeight: 500 } }, 'VALIDATED'),
              React.createElement('br', null),
              'PoF/W: ✓  KYC: ✓  MiCA: ✓  OFAC: ✓'
            ),
            React.createElement('hr', { className: 'sar-export-divider' }),
            React.createElement('div', { style: { fontSize: 10, color: 'var(--color-text-tertiary)', fontStyle: 'italic' } },
              'Certified by: Compliance Officer — Second Line of Defence (2LoD) · ' + new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })
            )
          ),
          React.createElement('button', {
            className: 'btn-primary',
            style: { marginTop: 10 },
            onClick: () => { setPhase('triage'); setNarrative(''); setStreamText(''); setChecks({ pof: false, kyc: false, mica: false, ofac: false }); setExportDone(false); }
          }, '← New Investigation')
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
