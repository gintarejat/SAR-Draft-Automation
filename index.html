<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agentic SAR Generator — ajatau AML</title>
</head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0d;
    --bg2:      #171715;
    --border:   rgba(255,255,255,0.1);
    --border2:  rgba(255,255,255,0.06);
    --text:     #e8e4da;
    --muted:    rgba(232,228,218,0.45);
    --dim:      rgba(232,228,218,0.25);
    --red:      #E24B4A;
    --amber:    #EF9F27;
    --green:    #639922;
    --radius:   6px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; min-height: 100vh; padding: 20px; }

  #app { max-width: 960px; margin: 0 auto; }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* HEADER */
  .header { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .header-left p { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; }
  .header-left h1 { font-size: 20px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; }
  .tags { display: flex; gap: 6px; align-items: center; }

  /* TAGS */
  .tag { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
  .tag-red   { background: rgba(226,75,74,0.15);   color: var(--red);   border: 1px solid rgba(226,75,74,0.3); }
  .tag-amber { background: rgba(239,159,39,0.12);  color: var(--amber); border: 1px solid rgba(239,159,39,0.3); }
  .tag-green { background: rgba(99,153,34,0.12);   color: var(--green); border: 1px solid rgba(99,153,34,0.3); }
  .tag-gray  { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border2); }

  /* GRID */
  .grid { display: grid; grid-template-columns: 240px 1fr; gap: 16px; }

  /* PANELS */
  .panel { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .panel-title { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; color: var(--dim); margin: 0 0 12px; font-family: 'IBM Plex Mono', monospace; }

  /* METRICS */
  .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; }
  .metric-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); font-family: 'IBM Plex Mono', monospace; }
  .metric-val { font-size: 15px; font-weight: 500; margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

  /* ALERT CARDS */
  .alert-card { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .alert-card:hover { border-color: var(--border); }
  .alert-card.selected { border-color: var(--red); border-width: 1px; }
  .alert-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; margin: 0 0 4px; }
  .alert-type { font-size: 11px; color: var(--muted); margin: 0 0 7px; }

  /* FIELD ROWS */
  .field-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 0.5px solid var(--border2); gap: 8px; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; padding-top: 1px; }
  .field-value { font-size: 11px; font-family: 'IBM Plex Mono', monospace; text-align: right; word-break: break-all; }

  /* STATUS BAR */
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); padding: 7px 10px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); margin-bottom: 12px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: var(--red); }
  .dot-amber { background: var(--amber); }
  .dot-green { background: var(--green); }

  /* NARRATIVE */
  .narrative-box { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; min-height: 240px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.75; color: var(--text); width: 100%; resize: vertical; display: block; white-space: pre-wrap; }
  textarea.narrative-box { outline: none; }
  textarea.narrative-box:focus { border-color: var(--border); }

  /* CHECKLIST */
  .check-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border2); }
  .check-row:last-child { border-bottom: none; }
  .check-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--red); cursor: pointer; flex-shrink: 0; }
  .check-label { font-size: 11px; font-weight: 500; cursor: pointer; flex: 1; }
  .check-ref { font-size: 10px; color: var(--dim); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }

  /* BUTTONS */
  .btn { border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: 0.03em; width: 100%; margin-top: 10px; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-dark { background: var(--text); color: var(--bg); }
  .btn-dark:hover:not(:disabled) { opacity: 0.85; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover:not(:disabled) { opacity: 0.85; }

  /* BANNERS */
  .banner { border-radius: var(--radius); padding: 8px 12px; font-size: 11px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .banner-error  { background: rgba(226,75,74,0.1);  color: #f08080; border: 0.5px solid rgba(226,75,74,0.3); }
  .banner-success { background: rgba(99,153,34,0.12); color: #8fc44a; border: 0.5px solid rgba(99,153,34,0.3); }

  /* SPINNER */
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CURSOR */
  .cursor { display: inline-block; width: 7px; height: 12px; background: var(--text); margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }

  /* EXPORT */
  .export-doc { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.8; }
  .export-doc h3 { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); margin: 14px 0 6px; font-weight: 600; }
  .export-doc h3:first-child { margin-top: 0; }
  .export-hr { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
  .export-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid var(--border2); font-size: 10px; }
  .export-row:last-child { border-bottom: none; }
  .export-key { color: var(--dim); }
</style>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useCallback } = React;
const e = React.createElement;

const ALERTS = [
  {
    id: 'CUST-NORDIC-772',
    txType: 'Cross-Border Wallet Transfer',
    risk: 'High',
    adverseMedia: 'YES',
    pep: 'Non-PEP',
    sowVerified: 'NO',
    mixer: 'YES',
    osint: 'Negative news in Swedish media; linked to sanctioned entities.',
    ofac: 'Clear',
    complexity: 'High-Risk Mixer Exposure'
  },
  {
    id: 'BP-9921-LT',
    txType: 'Cross-Border Crypto-to-Fiat',
    risk: 'High',
    adverseMedia: 'YES',
    pep: 'Non-PEP',
    sowVerified: 'NO',
    mixer: 'YES',
    osint: 'Negative news in Nordic media regarding shell company links.',
    ofac: 'Clear',
    complexity: 'High-Complexity / Corporate'
  }
];

function valColor(v) {
  if (v === 'YES' || v === 'High') return '#E24B4A';
  if (v === 'NO') return '#EF9F27';
  if (v === 'Clear') return '#639922';
  return 'inherit';
}

function App() {
  const [sel, setSel] = useState(0);
  const [phase, setPhase] = useState('triage'); // triage | investigating | review | exported
  const [narrative, setNarrative] = useState('');
  const [stream, setStream] = useState('');
  const [streaming, setStreaming] = useState(false);
  const [checks, setChecks] = useState({ pof: false, kyc: false, mica: false, ofac: false });
  const [error, setError] = useState('');

  const alert = ALERTS[sel];
  const allChecked = checks.pof && checks.kyc && checks.mica && checks.ofac;

  const selectAlert = (i) => {
    setSel(i);
    setPhase('triage');
    setNarrative('');
    setStream('');
    setChecks({ pof: false, kyc: false, mica: false, ofac: false });
    setError('');
  };

  const generate = useCallback(async () => {
    setStreaming(true);
    setStream('');
    setError('');
    setPhase('investigating');

    const prompt = `You are a Senior AML Compliance Officer at a Nordic FinTech institution, operating in the Second Line of Defence (2LoD). Generate a formal Statement of Facts (SOF) for an official SAR/STR filing based on the following alert data.

Alert Data:
- Customer ID: ${alert.id}
- Transaction Type: ${alert.txType}
- Risk Level: ${alert.risk}
- Adverse Media Flag: ${alert.adverseMedia}
- PEP Status: ${alert.pep}
- Source of Wealth Verified: ${alert.sowVerified}
- Crypto Mixer Flag: ${alert.mixer}
- OSINT Summary: ${alert.osint}
- OFAC Screening Result: ${alert.ofac}
- Business Model Complexity: ${alert.complexity}

Generate a professional SAR document with these sections:
1. Case & Filing Details
2. Subject Information
3. Summary of Suspicious Activity (3 paragraphs covering: transaction facts, investigative findings cross-referencing OSINT with AMLD6/MiCA context, and SoW verification failure rationale)
4. Detailed Transaction Information (table format)
5. Nature of Suspicion — Red Flags
6. Nature of Suspicion — Typologies
7. Additional Information (evidence list, related accounts, adverse media references)
8. Escalation Status
9. Recommendation
10. Signatures block

Be concise and precise. Use compliance language appropriate for FIU submission.`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error('API error ' + res.status + ': ' + text);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              full += parsed.delta.text;
              setStream(full);
            }
          } catch (_) {}
        }
      }
      setNarrative(full);
      setPhase('review');
    } catch (err) {
      setError('Investigation failed: ' + err.message);
      setPhase('triage');
    } finally {
      setStreaming(false);
    }
  }, [alert]);

  // ── LEFT PANEL ──
  const leftPanel = e('div', null,
    e('div', { className: 'panel' },
      e('p', { className: 'panel-title' }, 'EDD Alert Triage'),
      e('div', { className: 'metric-row' },
        e('div', { className: 'metric' },
          e('div', { className: 'metric-label' }, 'Alerts'),
          e('div', { className: 'metric-val' }, '2')
        ),
        e('div', { className: 'metric' },
          e('div', { className: 'metric-label' }, 'Risk'),
          e('div', { className: 'metric-val', style: { color: '#E24B4A' } }, 'HIGH')
        )
      ),
      ALERTS.map((a, i) =>
        e('div', {
          key: i,
          className: 'alert-card' + (sel === i ? ' selected' : ''),
          onClick: () => selectAlert(i)
        },
          e('p', { className: 'alert-id' }, a.id),
          e('p', { className: 'alert-type' }, a.txType),
          e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 4 } },
            e('span', { className: 'tag tag-red' }, 'High Risk'),
            a.mixer === 'YES' && e('span', { className: 'tag tag-amber' }, 'Mixer'),
            a.adverseMedia === 'YES' && e('span', { className: 'tag tag-amber' }, 'Adverse Media')
          )
        )
      )
    ),
    e('div', { className: 'panel' },
      e('p', { className: 'panel-title' }, 'Alert Detail'),
      [
        ['CUST ID',    alert.id],
        ['TX TYPE',    alert.txType],
        ['PEP',        alert.pep],
        ['SoW',        alert.sowVerified],
        ['MIXER',      alert.mixer],
        ['OFAC',       alert.ofac],
        ['COMPLEXITY', alert.complexity]
      ].map(([k, v]) =>
        e('div', { key: k, className: 'field-row' },
          e('span', { className: 'field-label' }, k),
          e('span', { className: 'field-value', style: { color: valColor(v) } }, v)
        )
      )
    )
  );

  // ── RIGHT PANEL ──
  let rightPanel;

  if (phase === 'triage') {
    rightPanel = e('div', null,
      e('div', { className: 'status-bar' },
        e('span', { className: 'dot dot-amber' }),
        'Awaiting investigation — select alert and initiate'
      ),
      e('div', { className: 'panel' },
        e('p', { className: 'panel-title' }, 'OSINT Summary'),
        e('p', { style: { fontFamily: 'IBM Plex Mono, monospace', fontSize: 11, lineHeight: 1.7, color: 'rgba(232,228,218,0.55)', margin: 0 } }, alert.osint)
      ),
      error && e('div', { className: 'banner banner-error' }, error),
      e('button', { className: 'btn btn-dark', onClick: generate, disabled: streaming },
        'Initiate Agentic Investigation →'
      )
    );
  }

  if (phase === 'investigating') {
    rightPanel = e('div', null,
      e('div', { className: 'status-bar' },
        e('span', { className: 'spinner' }),
        'Claude is analysing blockchain patterns and OSINT data...'
      ),
      e('div', { className: 'panel' },
        e('p', { className: 'panel-title' }, 'Statement of Facts — Generating'),
        e('div', { className: 'narrative-box', style: { minHeight: 300 } },
          stream,
          e('span', { className: 'cursor' })
        )
      )
    );
  }

  if (phase === 'review') {
    rightPanel = e('div', null,
      e('div', { className: 'status-bar' },
        e('span', { className: 'dot dot-amber' }),
        'L2 Quality Check — Human-in-the-Loop review required'
      ),
      e('div', { className: 'panel', style: { marginBottom: 12 } },
        e('p', { className: 'panel-title' }, 'Statement of Facts — Edit & Validate'),
        e('textarea', {
          className: 'narrative-box',
          value: narrative,
          onChange: ev => setNarrative(ev.target.value),
          style: { minHeight: 260 }
        })
      ),
      e('div', { className: 'panel', style: { marginBottom: 10 } },
        e('p', { className: 'panel-title' }, '2LoD Validation Checklist'),
        [
          ['pof',  'Proof of Funds / Wealth (PoF/W) Verified',          'AML Art. 8(3)'],
          ['kyc',  'KYC Validation Confirmed (Identity & Residency)',    'AMLD6 §13'],
          ['mica', 'MiCA Crypto Exposure & Nordic Media Review',         'MiCA 2023/1114'],
          ['ofac', 'OFAC / Sanctions Screening Re-confirmed',           'OFAC 31 CFR']
        ].map(([key, label, ref]) =>
          e('div', { key, className: 'check-row' },
            e('input', {
              type: 'checkbox',
              id: 'chk-' + key,
              checked: checks[key],
              onChange: ev => setChecks(c => ({ ...c, [key]: ev.target.checked }))
            }),
            e('label', { htmlFor: 'chk-' + key, className: 'check-label' }, label),
            e('span', { className: 'check-ref' }, ref)
          )
        )
      ),
      !allChecked && e('div', { className: 'banner banner-error' },
        'Submission blocked — complete all 2LoD checks to unlock export.'
      ),
      e('button', {
        className: 'btn btn-red',
        onClick: () => setPhase('exported'),
        disabled: !allChecked
      }, allChecked ? 'Export Official SAR / STR Report →' : 'Complete checklist to unlock export')
    );
  }

  if (phase === 'exported') {
    const today = new Date().toISOString().split('T')[0];
    rightPanel = e('div', null,
      e('div', { className: 'banner banner-success' },
        '✓ SAR_Report_' + alert.id + '.pdf — certified and exported'
      ),
      e('div', { className: 'export-doc' },
        e('h3', null, '◆ Official Suspicious Activity Report'),
        e('div', { style: { fontSize: 10, color: 'rgba(232,228,218,0.4)', marginBottom: 8, fontFamily: 'IBM Plex Mono, monospace' } },
          'Ref: SAR/' + alert.id + '/2026  ·  Filed: ' + today
        ),
        e('hr', { className: 'export-hr' }),
        e('h3', null, 'Section I — Subject Information'),
        [
          ['Customer ID',        alert.id],
          ['Transaction Type',   alert.txType],
          ['Risk Classification',alert.risk],
          ['Adverse Media',      alert.adverseMedia],
          ['PEP Status',         alert.pep],
          ['Source of Wealth',   alert.sowVerified === 'YES' ? 'Verified' : 'Not Verified'],
          ['Crypto Mixer',       alert.mixer === 'YES' ? 'Detected' : 'None'],
          ['OFAC / Sanctions',   alert.ofac],
          ['Business Complexity',alert.complexity]
        ].map(([k, v]) =>
          e('div', { key: k, className: 'export-row' },
            e('span', { className: 'export-key' }, k),
            e('span', { style: { fontWeight: 500, color: valColor(v) } }, v)
          )
        ),
        e('hr', { className: 'export-hr' }),
        e('h3', null, 'Section II — Statement of Facts'),
        e('div', { style: { whiteSpace: 'pre-wrap', fontSize: 10, lineHeight: 1.8, color: 'rgba(232,228,218,0.6)' } }, narrative),
        e('hr', { className: 'export-hr' }),
        e('h3', null, 'Section III — Compliance Officer Decision'),
        e('div', { style: { fontSize: 10, lineHeight: 1.8 } },
          'Decision: ', e('strong', null, 'RECOMMEND SAR FILING'), e('br'),
          'L2 Status: ', e('span', { style: { color: '#8fc44a', fontWeight: 500 } }, 'VALIDATED'), e('br'),
          'PoF/W: ✓   KYC: ✓   MiCA: ✓   OFAC: ✓'
        ),
        e('hr', { className: 'export-hr' }),
        e('div', { style: { fontSize: 10, color: 'rgba(232,228,218,0.3)', fontStyle: 'italic' } },
          'Certified by: Compliance Officer — 2LoD  ·  ' + new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })
        )
      ),
      e('button', {
        className: 'btn btn-dark',
        style: { marginTop: 10 },
        onClick: () => selectAlert(sel)
      }, '← New Investigation')
    );
  }

  return e('div', { id: 'app' },
    e('div', { className: 'header' },
      e('div', { className: 'header-left' },
        e('p', null, 'Anti-Money Laundering · Second Line of Defence'),
        e('h1', null, 'Agentic SAR Generator')
      ),
      e('div', { className: 'tags' },
        e('span', { className: 'tag tag-red' }, 'L1 → L2 QC'),
        e('span', { className: 'tag tag-green' }, 'MiCA / AMLD6')
      )
    ),
    e('div', { className: 'grid' },
      leftPanel,
      rightPanel
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
</script>
</body>
</html>
