<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0d;--bg2:#171715;--bg3:#1e1e1b;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.06);
  --text:#e8e4da;--muted:rgba(232,228,218,0.5);--dim:rgba(232,228,218,0.28);
  --red:#E24B4A;--amber:#EF9F27;--green:#639922;--teal:#14b882;
  --r:6px;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh;padding:0}
#root{max-width:1020px;margin:0 auto;padding:20px}

/* TOP NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px}
.topnav-left p{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.topnav-left h1{font-size:19px;font-weight:500;font-family:'IBM Plex Mono',monospace}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:7px 14px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);background:transparent;border:0.5px solid transparent;border-radius:var(--r);cursor:pointer;transition:all .15s}
.nav-tab:hover{color:var(--text);background:var(--bg2)}
.nav-tab.active{color:var(--text);background:var(--bg2);border-color:var(--border2)}
.nav-tab.docs-tab.active{color:var(--teal);border-color:rgba(20,184,130,0.3);background:rgba(20,184,130,0.08)}

/* STEP BAR */
.steps{display:flex;border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.step{flex:1;padding:7px 4px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);background:var(--bg2);border-right:0.5px solid var(--border2);text-align:center}
.step:last-child{border-right:none}
.step.active{color:var(--text);background:var(--bg3);font-weight:500}
.step.done{color:var(--green)}

/* LAYOUT */
.grid{display:grid;grid-template-columns:210px 1fr;gap:14px}
.panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.pt{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--dim);margin:0 0 10px;font-family:'IBM Plex Mono',monospace}

/* ALERT CARDS */
.ac{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.ac:hover{border-color:var(--border)}
.ac.sel{border-color:var(--red)}
.aid{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;margin:0 0 2px}
.atp{font-size:11px;color:var(--muted);margin:0 0 6px}
.tag{display:inline-block;font-size:9px;font-weight:500;letter-spacing:.06em;padding:2px 6px;border-radius:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-right:3px}
.t-r{background:rgba(226,75,74,.14);color:var(--red);border:0.5px solid rgba(226,75,74,.3)}
.t-a{background:rgba(239,159,39,.12);color:var(--amber);border:0.5px solid rgba(239,159,39,.3)}
.t-g{background:rgba(99,153,34,.12);color:var(--green);border:0.5px solid rgba(99,153,34,.3)}
.t-t{background:rgba(20,184,130,.1);color:var(--teal);border:0.5px solid rgba(20,184,130,.3)}

/* FIELD ROWS */
.fr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--border2);gap:6px}
.fr:last-child{border-bottom:none}
.fl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.fv{font-size:10px;font-family:'IBM Plex Mono',monospace;text-align:right;word-break:break-all}

/* STATUS BAR */
.sbar{display:flex;align-items:center;gap:8px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);padding:6px 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);margin-bottom:10px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.da{background:var(--red)}.db{background:var(--amber)}.dc{background:var(--green)}.dt{background:var(--teal)}

/* METRICS */
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.met{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 10px}
.ml{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.mv{font-size:15px;font-weight:500;margin-top:2px;font-family:'IBM Plex Mono',monospace}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ff{display:flex;flex-direction:column;gap:3px}
.flb{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.fi{background:var(--bg);border:0.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 9px;border-radius:var(--r);outline:none;width:100%}
.fi:focus{border-color:var(--border)}

/* TX TABLE */
table.tx{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:10px;margin-bottom:8px;table-layout:fixed}
table.tx th{font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);font-weight:500;padding:5px 4px;border-bottom:0.5px solid var(--border);text-align:left;overflow:hidden}
table.tx td{padding:3px 2px;border-bottom:0.5px solid var(--border2);vertical-align:middle;overflow:hidden}
table.tx tr:last-child td{border-bottom:none}
.ti{background:transparent;border:none;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;width:100%;padding:3px 2px;outline:none;min-width:0}
.ti:focus{background:rgba(255,255,255,.04);border-radius:3px}
.ts{background:var(--bg);border:0.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 4px;border-radius:3px;cursor:pointer;width:100%}
.tdel{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px 4px;line-height:1}
.tdel:hover{color:var(--red)}

/* NARRATIVE */
.nb{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px 14px;min-height:200px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.75;color:var(--text);width:100%;resize:vertical;display:block;white-space:pre-wrap;box-sizing:border-box}
textarea.nb{outline:none}
textarea.nb:focus{border-color:var(--border)}

/* CHECKLIST */
.cr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border2)}
.cr:last-child{border-bottom:none}
.cr input{width:14px;height:14px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
.cl{font-size:11px;font-weight:500;cursor:pointer;flex:1}
.crf{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap}

/* BUTTONS */
.btn{border:none;border-radius:var(--r);padding:9px 16px;font-size:11px;font-weight:500;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;letter-spacing:.03em;transition:opacity .15s}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:0.5px solid var(--border2)}
.btn-ghost:hover:not(:disabled){border-color:var(--border);color:var(--text)}
.btn-solid{background:var(--text);color:var(--bg)}
.btn-solid:hover:not(:disabled){opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover:not(:disabled){opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){opacity:.85}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-full{width:100%;margin-top:8px}

/* BANNERS */
.bn{border-radius:var(--r);padding:7px 11px;font-size:11px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.be{background:rgba(226,75,74,.1);color:#f08080;border:0.5px solid rgba(226,75,74,.3)}
.bs{background:rgba(99,153,34,.12);color:#8fc44a;border:0.5px solid rgba(99,153,34,.3)}

/* SPINNER */
.sp{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{from{opacity:.25}to{opacity:.55}}

/* ═══════════════════════════════
   DOCS PAGE
═══════════════════════════════ */
.docs-page{max-width:780px}
.docs-hero{padding:28px 0 24px;border-bottom:1px solid var(--border2);margin-bottom:28px}
.docs-hero-kicker{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.docs-hero-title{font-size:26px;font-weight:500;line-height:1.15;margin-bottom:10px;letter-spacing:-.02em}
.docs-hero-sub{font-size:13px;color:var(--muted);line-height:1.75;max-width:580px}
.docs-section{margin-bottom:36px}
.docs-section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.docs-section-title::after{content:'';flex:1;height:1px;background:rgba(20,184,130,.2)}
.docs-h2{font-size:16px;font-weight:500;margin-bottom:8px;letter-spacing:-.01em}
.docs-p{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:12px}
.docs-p strong{color:var(--text);font-weight:500}
.docs-p a{color:var(--teal);text-decoration:none}

/* FLOW DIAGRAM */
.flow{display:flex;flex-direction:column;gap:0;margin:16px 0 24px}
.flow-step{display:flex;gap:16px;align-items:flex-start;position:relative}
.flow-step::before{content:'';position:absolute;left:17px;top:36px;width:1px;height:calc(100% + 0px);background:var(--border2)}
.flow-step:last-child::before{display:none}
.flow-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;flex-shrink:0;margin-bottom:16px}
.fn-gray{background:var(--bg2);border:1px solid var(--border);color:var(--muted)}
.fn-red{background:rgba(226,75,74,.15);border:1px solid rgba(226,75,74,.3);color:var(--red)}
.fn-amber{background:rgba(239,159,39,.12);border:1px solid rgba(239,159,39,.3);color:var(--amber)}
.fn-teal{background:rgba(20,184,130,.1);border:1px solid rgba(20,184,130,.3);color:var(--teal)}
.fn-green{background:rgba(99,153,34,.12);border:1px solid rgba(99,153,34,.3);color:var(--green)}
.flow-content{flex:1;padding-bottom:4px}
.flow-title{font-size:13px;font-weight:500;margin-bottom:3px;margin-top:6px}
.flow-desc{font-size:12px;color:var(--muted);line-height:1.7}
.flow-who{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-top:5px}
.who-human{background:rgba(20,184,130,.1);color:var(--teal);border:0.5px solid rgba(20,184,130,.3)}
.who-ai{background:rgba(239,159,39,.1);color:var(--amber);border:0.5px solid rgba(239,159,39,.3)}
.who-both{background:rgba(255,255,255,.05);color:var(--muted);border:0.5px solid var(--border2)}

/* HITL CALLOUT */
.hitl-box{background:rgba(20,184,130,.06);border:1px solid rgba(20,184,130,.25);border-radius:var(--r);padding:16px 18px;margin:16px 0}
.hitl-box-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hitl-box-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.hitl-box p{font-size:12px;color:rgba(232,228,218,0.6);line-height:1.75}
.hitl-box p strong{color:var(--text)}

/* MOCK REPORT */
.mock-report{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin:16px 0}
.mock-report-header{background:var(--red);padding:8px 14px;display:flex;justify-content:space-between}
.mock-report-header span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.8);letter-spacing:.08em;text-transform:uppercase}
.mock-report-body{padding:14px 16px}
.mock-report-title{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;margin-bottom:4px}
.mock-report-ref{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:12px}
.mock-divider{height:0.5px;background:var(--border2);margin:10px 0}
.mock-sec-title{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;background:var(--bg3);padding:3px 6px;border-radius:3px;display:inline-block}
.mock-kv{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border2);font-size:10px;font-family:'IBM Plex Mono',monospace}
.mock-kv:last-child{border-bottom:none}
.mock-kv-key{color:var(--dim)}
.mock-narrative{font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.75;color:var(--muted);margin-top:6px}
.mock-nar-highlight{color:var(--teal)}
.mock-tx-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:9px;margin-top:6px}
.mock-tx-table th{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:4px 5px;border-bottom:0.5px solid var(--border);text-align:left;background:rgba(0,0,0,.2)}
.mock-tx-table td{padding:3px 5px;border-bottom:0.5px solid var(--border2);color:var(--muted)}
.mock-checklist{margin-top:6px}
.mock-check{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px;font-family:'IBM Plex Mono',monospace}
.mock-check-box{width:12px;height:12px;border-radius:2px;border:1px solid var(--green);background:rgba(99,153,34,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mock-check-tick{color:var(--green);font-size:9px}
.mock-check-text{color:var(--muted)}
.mock-check-ref{color:var(--dim);margin-left:auto;font-size:9px}
.mock-blocked{background:rgba(226,75,74,.08);border:0.5px solid rgba(226,75,74,.25);border-radius:3px;padding:5px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:#f08080;display:flex;align-items:center;gap:6px;margin-top:6px}
.mock-blocked::before{content:'⊘';font-size:11px}

/* RESPONSIBILITY TABLE */
.resp-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.resp-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--border2);text-align:left;font-family:'IBM Plex Mono',monospace}
.resp-table td{padding:6px 10px;border-bottom:0.5px solid var(--border2);color:var(--muted)}
.resp-table tr:last-child td{border-bottom:none}
.resp-table td:first-child{color:var(--text)}
.resp-human{color:var(--teal) !important;font-weight:500}
.resp-ai{color:var(--amber) !important}

/* CODE BLOCK */
.code-block{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.75;color:rgba(232,228,218,0.6);margin:10px 0;overflow-x:auto}
.code-comment{color:rgba(99,153,34,.7)}
.code-key{color:var(--teal)}
.code-val{color:var(--amber)}
.code-str{color:rgba(232,228,218,.4)}
</style>

function SARApp(){
  const [sel,setSel]=useState(0);
  const [phase,setPhase]=useState('triage');
  const [nar,setNar]=useState('');
  const [busy,setBusy]=useState(false);
  const [chk,setChk]=useState({pof:false,kyc:false,mica:false,ofac:false});
  const [err,setErr]=useState('');
  const [txRows,setTxRows]=useState([drow()]);
  const [sub,setSub]=useState({name:'',dob:'',address:'',contact:'',idNum:'',email:''});

  const alert=ALERTS[sel];
  const allOk=chk.pof&&chk.kyc&&chk.mica&&chk.ofac;

  const reset=i=>{setSel(i);setPhase('triage');setNar('');setChk({pof:false,kyc:false,mica:false,ofac:false});setTxRows([drow()]);setSub({name:'',dob:'',address:'',contact:'',idNum:'',email:''});setErr('');};
  const fillDummy=()=>{const d=DUMMY[alert.id];if(!d)return;setSub(d.sub);setTxRows(d.tx);};
  const addRow=()=>setTxRows(r=>[...r,drow()]);
  const delRow=id=>setTxRows(r=>r.filter(x=>x.id!==id));
  const upRow=(id,f,v)=>setTxRows(r=>r.map(x=>x.id===id?{...x,[f]:v}:x));
  const upSub=(f,v)=>setSub(s=>({...s,[f]:v}));

  const generate=useCallback(async()=>{
    setBusy(true);setErr('');setPhase('investigating');
    const txStr=txRows.filter(r=>r.date||r.amount||r.sender).map(r=>`Date:${r.date} Amount:${r.amount} ${r.ccy} Sender:${r.sender} Receiver:${r.receiver} Method:${r.method} Notes:${r.details}`).join('\n')||'No transactions entered.';
    const prompt=`You are a Senior AML Compliance Officer writing a formal SAR Statement of Facts for FIU submission.

Alert: ${alert.id} | ${alert.txType} | Risk: ${alert.risk}
Subject: ${sub.name||'[not entered]'}, DOB: ${sub.dob||'N/A'}, Address: ${sub.address||'N/A'}
Mixer: ${alert.mixer} | Adverse Media: ${alert.adverseMedia} | SoW Verified: ${alert.sow} | OFAC: ${alert.ofac}
OSINT: ${alert.osint} | Complexity: ${alert.complexity}

Transactions:
${txStr}

Write exactly 3 professional paragraphs (no headings, no bullets):
1. STATEMENT OF FACTS: Chronological suspicious activity. Reference actual dates/amounts from the transactions above. Explain why the mixer flag indicates fund obfuscation.
2. INVESTIGATIVE FINDINGS: Cross-reference OSINT with AMLD6/MiCA. Analyse SoW failure against business model complexity. Cite specific regulatory articles.
3. COMPLIANCE DECISION: State whether SAR filing is recommended. Cite OFAC status, PEP status, AMLD6 Art. 33. Be definitive.`;
    try{
      const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t);}
      const data=await res.json();
          const raw = await res.text();
          if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + raw);
          let data;
          try { data = JSON.parse(raw); } catch(_) { throw new Error('Not valid JSON: ' + raw.slice(0,200)); }
          if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
          if (!data.content || !Array.isArray(data.content)) throw new Error('Bad response shape: ' + JSON.stringify(data).slice(0,300));
          const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
          if (!text) throw new Error('No text block in response');      setNar(text);setPhase('review');
    }
    catch(e){setErr('Failed: '+e.message);setPhase('transactions');}
    finally{setBusy(false);}
  },[alert,txRows,sub]);

  /* LEFT SIDEBAR */
  const left=h('div',null,
    h('div',{className:'panel'},
      h('p',{className:'pt'},'EDD Alert Triage'),
      h('div',{className:'mrow'},
        h('div',{className:'met'},h('div',{className:'ml'},'Alerts'),h('div',{className:'mv'},'2')),
        h('div',{className:'met'},h('div',{className:'ml'},'Risk'),h('div',{className:'mv',style:{color:'var(--red)'}},'HIGH'))
      ),
      ALERTS.map((a,i)=>h('div',{key:i,className:'ac'+(sel===i?' sel':''),onClick:()=>reset(i)},
        h('p',{className:'aid'},a.id),
        h('p',{className:'atp'},a.txType),
        h('div',null,h('span',{className:'tag t-r'},'High'),a.mixer==='YES'&&h('span',{className:'tag t-a'},'Mixer'),a.adverseMedia==='YES'&&h('span',{className:'tag t-a'},'Adverse'))
      ))
    ),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'Alert Detail'),
      [['ID',alert.id],['TX',alert.txType.slice(0,16)+'…'],['PEP',alert.pep],['SoW',alert.sow],['MIXER',alert.mixer],['OFAC',alert.ofac]]
        .map(([k,v])=>h('div',{key:k,className:'fr'},h('span',{className:'fl'},k),h('span',{className:'fv',style:{color:vc(v)}},v)))
    )
  );

  /* RIGHT CONTENT per phase */
  let right;

  if(phase==='triage')right=h('div',null,
    h('div',{className:'sbar'},h('span',{className:'dot db'}),'Enter subject info, then proceed to transactions'),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'Subject Information'),
      h('div',{className:'fg'},
        ...Object.entries({name:'Full Name',dob:'Date of Birth',address:'Address',contact:'Phone / Email',idNum:'ID / Passport',email:'Officer Email'})
          .map(([k,lbl])=>h('div',{key:k,className:'ff'},h('label',{className:'flb'},lbl),h('input',{className:'fi',placeholder:lbl,value:sub[k],onChange:e=>upSub(k,e.target.value)})))
      )
    ),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'OSINT'),
      h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:11,lineHeight:1.7,color:'var(--muted)',margin:0}},alert.osint)
    ),
    h('div',{className:'btn-row'},
      h('button',{className:'btn btn-ghost',onClick:fillDummy},'⚡ Fill test data'),
      h('button',{className:'btn btn-solid',style:{flex:1},onClick:()=>setPhase('transactions')},'Continue →')
    )
  );

  if(phase==='transactions')right=h('div',null,
    h('div',{className:'sbar'},h('span',{className:'dot db'}),'Enter all suspicious and related transactions'),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'Transaction List'),
      h('table',{className:'tx'},
        h('thead',null,h('tr',null,
          h('th',{style:{width:68}},'Date'),h('th',{style:{width:56}},'Amount'),h('th',{style:{width:48}},'CCY'),
          h('th',{style:{width:'14%'}},'Sender'),h('th',{style:{width:'14%'}},'Receiver'),
          h('th',{style:{width:68}},'Method'),h('th',{},'Details'),h('th',{style:{width:24}},'')
        )),
        h('tbody',null,txRows.map(row=>h('tr',{key:row.id},
          h('td',null,h('input',{className:'ti',placeholder:'2025-11-10',value:row.date,onChange:e=>upRow(row.id,'date',e.target.value)})),
          h('td',null,h('input',{className:'ti',placeholder:'45,000',value:row.amount,onChange:e=>upRow(row.id,'amount',e.target.value)})),
          h('td',null,h('select',{className:'ts',value:row.ccy,onChange:e=>upRow(row.id,'ccy',e.target.value)},['EUR','USD','GBP','BTC','ETH','USDT'].map(c=>h('option',{key:c},c)))),
          h('td',null,h('input',{className:'ti',placeholder:'Wallet / Name',value:row.sender,onChange:e=>upRow(row.id,'sender',e.target.value)})),
          h('td',null,h('input',{className:'ti',placeholder:'Account / Wallet',value:row.receiver,onChange:e=>upRow(row.id,'receiver',e.target.value)})),
          h('td',null,h('select',{className:'ts',value:row.method,onChange:e=>upRow(row.id,'method',e.target.value)},['','Crypto Transfer','SEPA','SWIFT','Card','Cash','Internal'].map(m=>h('option',{key:m,value:m},m||'Select…')))),
          h('td',null,h('input',{className:'ti',placeholder:'Notes',value:row.details,onChange:e=>upRow(row.id,'details',e.target.value)})),
          h('td',null,h('button',{className:'tdel',onClick:()=>delRow(row.id)},'×'))
        )))
      ),
      h('button',{onClick:addRow,style:{marginTop:4}},'+ Add row')
    ),
    err&&h('div',{className:'bn be'},err),
    h('button',{className:'btn btn-solid btn-full',onClick:generate,disabled:busy},busy?'Generating…':'Generate SAR Narrative →')
  );

  if(phase==='investigating')right=h('div',null,
    h('div',{className:'sbar'},h('span',{className:'sp'}),'Claude is analysing transactions and OSINT data — please wait…'),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'Generating Statement of Facts'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8,padding:'16px 0'}},
        ...[40,72,55,82,46,64,38].map((w,i)=>h('div',{key:i,style:{height:9,borderRadius:4,background:'var(--border2)',width:w+'%',animation:`pulse 1.4s ease-in-out ${i*0.18}s infinite alternate`}}))
      )
    )
  );

  if(phase==='review')right=h('div',null,
    h('div',{className:'sbar'},h('span',{className:'dot db'}),'Read and edit the narrative, then complete the 2LoD checklist'),
    h('div',{className:'panel',style:{marginBottom:10}},
      h('p',{className:'pt'},'Statement of Facts — Edit Before Export'),
      h('textarea',{className:'nb',value:nar,onChange:e=>setNar(e.target.value),style:{minHeight:220}})
    ),
    h('div',{className:'panel',style:{marginBottom:8}},
      h('p',{className:'pt'},'2LoD Validation Checklist — all required before export'),
      [['pof','Proof of Funds / Wealth verified','AML Art. 8(3)'],
       ['kyc','KYC confirmed — identity & residency','AMLD6 §13'],
       ['mica','MiCA crypto exposure & media review','MiCA 2023/1114'],
       ['ofac','OFAC / sanctions re-confirmed','OFAC 31 CFR']]
        .map(([k,l,r])=>h('div',{key:k,className:'cr'},
          h('input',{type:'checkbox',id:'c'+k,checked:chk[k],onChange:e=>setChk(c=>({...c,[k]:e.target.checked}))}),
          h('label',{htmlFor:'c'+k,className:'cl'},l),
          h('span',{className:'crf'},r)
        ))
    ),
    !allOk&&h('div',{className:'bn be'},'Export blocked — complete all 2LoD checks to proceed.'),
    h('button',{
      className:'btn btn-full',
      style:{background:allOk?'var(--red)':'',color:allOk?'#fff':'',border:'none'},
      onClick:()=>{exportPDF(sub,txRows,nar,alert);setPhase('exported');},
      disabled:!allOk
    },allOk?'Download SAR PDF →':'Complete checklist to unlock')
  );

  if(phase==='exported')right=h('div',null,
    h('div',{className:'bn bs'},'✓ SAR_'+alert.id+'.pdf downloaded'),
    h('div',{className:'panel'},
      h('p',{className:'pt'},'Export Summary'),
      [['Reference','SAR/'+alert.id+'/2026'],['Subject',sub.name||'—'],['Transactions',txRows.filter(r=>r.date||r.amount).length+' rows'],['2LoD Checks','PoF/W ✓  KYC ✓  MiCA ✓  OFAC ✓'],['Decision','RECOMMEND SAR FILING'],['Filed',new Date().toLocaleDateString('en-GB')]]
        .map(([k,v])=>h('div',{key:k,className:'fr'},h('span',{className:'fl'},k),h('span',{className:'fv'},v)))
    ),
    h('div',{className:'btn-row'},
      h('button',{className:'btn btn-ghost',onClick:()=>reset(sel)},'← New Investigation'),
      h('button',{className:'btn btn-ghost',onClick:()=>exportPDF(sub,txRows,nar,alert)},'Re-download PDF')
    )
  );

  return h('div',null,
    h('style',null,'@keyframes pulse{from{opacity:.2}to{opacity:.5}}'),
    h('div',{className:'steps'},PHASES.map((p,i)=>h('div',{key:i,className:'step'+(PI[phase]===i?' active':PI[phase]>i?' done':'')},(PI[phase]>i?'✓ ':'')+p))),
    h('div',{className:'grid'},left,right)
  );
}

/* ══════════════════════════════════════
   ROOT — handles nav between app / docs
══════════════════════════════════════ */
function Root(){
  const [view,setView]=useState('app');
  return h('div',{id:'root'},
    h('div',{className:'topnav'},
      h('div',{className:'topnav-left'},
        h('p',null,'Anti-Money Laundering · Second Line of Defence'),
        h('h1',null,'Agentic SAR Generator')
      ),
      h('div',{className:'nav-tabs'},
        h('button',{className:'nav-tab'+(view==='app'?' active':''),onClick:()=>setView('app')},'SAR Generator'),
        h('button',{className:'nav-tab docs-tab'+(view==='docs'?' active':''),onClick:()=>setView('docs')},'How It Works')
      )
    ),
    view==='app'?h(SARApp):h(DocsPage)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Root));
</script>
